## https://starship.rs/config/#git-branch
[git_branch]
always_show_remote = false
disabled           = false
format             = '([$symbol $branch(:$remote_branch)]($style) )'
ignore_bare_repo   = true
only_attached      = true
style              = 'purple'
symbol             = '¾░ś¼'

## https://starship.rs/config/#git-commit
[git_commit]
commit_hash_length = 8
disabled           = false
format             = '([¾░ś¼ $hash]($style) )'
only_detached      = true
style              = 'purple'
tag_disabled       = true

## https://starship.rs/config/#git-status
[git_status]
ahead              = '[¾░Ėć${count}](green)'
behind             = '[¾░«Å${count}](cyan)'
conflicted         = '[=](red)'
deleted            = '[X](blue)'
disabled           = false
diverged           = '[¾░Ėć${ahead_count}|${behind_count}¾░«Å](yellow)'
format             = '([\[$all_status$ahead_behind\]]($style) )'
ignore_submodules  = true
modified           = '[!](yellow)'
renamed            = '[>](cyan)'
staged             = '[+](green)'
stashed            = '[$](white)'
style              = 'bold dimmed'
typechanged        = '[~](blue)'
untracked          = '[?](purple)'
use_git_executable = true

## https://starship.rs/config/#git-metrics
[git_metrics]
added_style        = 'green'
deleted_style      = 'red'
disabled           = true
format             = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
ignore_submodules  = true
only_nonzero_diffs = true

## https://starship.rs/config/#git-state
[git_state]
bisect      = 'BISECTING'
cherry_pick = 'CHERRY-PICKING'
disabled    = false
format      = '(\([$state( $progress_current/$progress_total)]($style)\) )'
merge       = 'MERGING'
rebase      = 'REBASING'
revert      = 'REVERTING'
style       = 'bold yellow'

