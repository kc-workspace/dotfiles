## https://starship.rs/config/#default-prompt-format
format = """
$username$sudo$hostname$localip\
$battery$memory_usage$jobs\

$line_break\

$directory\
$git_branch$git_commit$git_status$git_metrics$git_state\
$hg_branch$hg_state\
$fossil_branch$fossil_metrics\
$pijul_channel\
$package\
$bun$deno$nodejs\
$conda$meson$pixi\
$gradle$kotlin$java\
${custom.terragrunt}$terraform$pulumi\
$container$singularity$kubernetes$docker_context\
$buf$c$cpp$cmake$cobol$crystal\
$daml$dart$dotnet$elixir$elm$erlang\
$fennel$fortran$gleam$golang$guix_shell\
$haskell$haxe$julia$lua$mojo\
$nats$netns$nim$nix_shell$ocaml$odin$opa\
$perl$php$purescript$quarto\
$rlang$raku$red$ruby$rust\
$scala$solidity$spack$swift\
$typst$vagrant$vlang$vcsh\
$xmake$zig\
$mise$direnv\
$aws$gcloud$azure$openstack\

$fill\
$shell$time\
$line_break\

$shlvl$character
"""

## https://starship.rs/advanced-config/#enable-right-prompt
right_format = """
$status$os$cmd_duration
"""

## https://starship.rs/config/#options
add_newline         = false
command_timeout     = 500
continuation_prompt = '[¾░äŠ](dimmed bold) '
follow_symlinks     = false
scan_timeout        = 30

palette = 'custom'
[palettes.custom]
bright-brown  = '160'
bright-gray   = '253'
bright-orange = '214'
bright-pink   = '225'
bright-teal   = '37'
bright-violet = '177'
brown         = '124'
gray          = '244'
orange        = '208'
pink          = '218'
teal          = '30'
violet        = '165'

