_base:
  definitions:
    featureFlags:
      ## Include personal user config
      git::personal:config:
        whenEnable:
          type: file
      ## Include Smartertravel specific config
      git::stm:config:
        whenEnable:
          type: file
      ## Enable gpg sign on both commit and tag
      ## @depends - [ssh::github:config]
      git::sign:config:
        whenEnable:
          type: file
      ## Use 1Password `op-ssh-sign` to sign commit/tag on gitconfig
      git::onepassword:config: ## TODO: implement this
        whenEnable:
          type: file
