docker:
  linux/alpine:
    settings:
      featureFlags:
        - mise::node:unofficial-builds
        - nvim::plugins:install
        - zinit::plugins:install
    preferences: {}
    dependencies:
      apk:
        packages: []
        settings:
          autoupdate: true
          autoupgrade: true
      ## alpine is not supported by homebrew
      brew:
        taps: []
        packages: []
        casks: []
        settings:
          binpath: /home/linuxbrew/.linuxbrew/bin
          autoinstall: false
      mise:
        packages:
          - node
          - bun
          - go
          - python
          - uv
          - chezmoi
          - neovim
        settings:
          autoinstall: true
          autoupdate: false
