docker:
  linux/alpine:
    settings: {}
    preferences: {}
    dependencies:
      apk:
        packages: []
        settings:
          autoupdate: true
          autoupgrade: true
      ## alpine is not supported by homebrew
      brew:
        taps: []
        packages: []
        casks: []
        settings:
          binpath: /home/linuxbrew/.linuxbrew/bin
          autoinstall: false
      mise:
        packages:
          - nodejs
          - bun
          - go
          - python
          - uv
          - chezmoi
          - neovim
        settings:
          autoinstall: true
          autoupdate: false
