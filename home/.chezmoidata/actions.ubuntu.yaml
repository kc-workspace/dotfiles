actions:
  linux/ubuntu:
    settings:
      featureFlags:
        - nvim::plugins:install
        - zinit::plugins:install
    preferences: {}
    dependencies:
      apt:
        packages:
          - zsh
          - git
          - gpg
        settings:
          autoupgrade: false
      ## Don't install brew on actions, because it randomly fails
      ## No such file or directory @ rb_sysopen - /<path>
      brew:
        taps: []
        packages: []
        casks: []
        settings:
          binpath: /home/linuxbrew/.linuxbrew/bin
          env:
            HOMEBREW_MAKE_JOBS: "1"
            HOMEBREW_DOWNLOAD_CONCURRENCY: "1"
      mise:
        packages: <ALL>
        settings:
          autoupdate: false
