actions:
  linux/ubuntu:
    settings: {}
    preferences: {}
    dependencies:
      apt:
        packages:
          - zsh
          - git
          - gpg
        settings:
          autoupgrade: false
      brew:
        taps: []
        packages:
          - nmap
        casks: []
        settings:
          env:
            HOMEBREW_MAKE_JOBS: "1"
            HOMEBREW_DOWNLOAD_CONCURRENCY: "1"
      mise:
        packages:
          - nodejs
          - bun
          - go
          - python
          - uv
          - chezmoi
          - neovim
        settings:
          autoinstall: true
          autoupdate: false
