_base:
  preferences:
    # defaults:
    #   - domain: [NSGlobalDomain | <domain-name> | -app <app-name> | <plist-path>]
    #     settings:
    #       - key: <preference-key>
    #         value: [<preference-value> | null] ## Use null to delete a preference
    #         [host: [current | <host-name>]]    ## Use current to currentHost
    #         [type: <preference-type>]          ## run `defaults --help` for a list of types
    #     [hooks:]
    #       [before: <hook-command>]             ## Run a command before the preference is set
    #       [after: <hook-command>]              ## Run a command after the preference is set
    defaults: []

    ## Set up macOS keyboard shortcuts using shortcututil.
    # shortcututil:
    #   - name: <shortcut-name>
    #     key: <shortcut-key>
    #     enabled: <boolean>
    #     [type: [standard | modifier | SAE1.0]]
    #     [parameters: [[<int>, <int>, <int>] | [<int>, <int>]]]
    shortcututil: []

    ## Set up macOS Dock items using dockutil.
    dockutil:
      ## app section is on the left side of the dock
      # apps:
      #   - name: <app-name>
      #     [action: [add | move | remove]]
      #     [settings:]
      #       [position: [beginning | middle | end | <index>]]               ## Inserts the item at a fixed position
      #       [allhomes: <boolean>]                                          ## Whether to attempt to locate all home directories and perform the operation on each of them
      #       [homeloc: <path-to-home>]                                      ## Location for home directories (default: /Users)
      #       [view: [grid | fan | list | auto]]                             ## Folder view option when adding a folder
      #       [display: [folder | stack]]                                    ## Folder display option when adding a folder
      #       [sort: [name | dateadded | datemodified | datecreated | kind]] ## Folder sort option when adding a folder
      apps: []
      ## other section is on the right side of the dock
      ## Same as above
      others: []

      settings:
        ## Whether to start with an empty Dock
        ## @type - boolean
        startEmpty: true
        ## Whether to restart the Dock always or only at the end of the run
        ## @type - [always | end]
        restart: end
        ## Whether to uninstall dockutil after finish using
        ## @type - boolean
        autoremove: false

  dependencies:
    apt:
      ## List of packages to install
      ## @type - string[]
      packages: []
      settings:
        command: apt      ## Use `apt` command to execute (possible values: apt, apt-get)
        autoupdate: true  ## Run `apt update` before install packages
        autoupgrade: true ## Run `apt upgrade` after install packages
        autoclean: true   ## Run `apt clean` after install packages

    apk:
      ## List of packages to install
      ## @type - string[]
      packages: []
      settings:
        autoupdate: true  ## Run `apk update` before install packages
        autoupgrade: true ## Run `apk upgrade` after install packages

    brew:
      ## List of brew tap to install
      ## @type - string[]
      taps: []
      ## List of brew to install
      ## @type - string[]
      packages: []
      ## List of brew cask to install
      ## @type - string[]
      casks: []
      settings:
        ## Autoinstall when cannot find brew command
        autoinstall: true
        ## Autoupdate before install any packages
        autoupdate: true
        ## Autoclean after install all packages
        autoclean: true
        ## ref: https://docs.brew.sh/Manpage#environment
        env:
          HOMEBREW_NO_ANALYTICS: true ## Do not send analytics
          HOMEBREW_NO_ENV_HINTS: true ## Do not print any hints

    mas:
      # packages:
      #   - name: <app-name>
      #     id: <app-id>
      packages: []
      settings:
        ## Autoinstall when cannot find mas command (depends on brew)
        autoinstall: true
        ## Autoreset before install any packages
        autoreset: true
        ## Autoupdate after install all packages
        autoupdate: true
        ## Whether to uninstall mas after finish using
        autoremove: false

    mise:
      ## List of mise tool to install
      ## use <ALL> to install all tools defined
      ## @type - [string[] | "<ALL>"]
      packages: []
      settings:
        ## Autoinstall mise when cannot find mise command
        autoinstall: true
        ## Autoupdate mise before install any packages
        autoupdate: true

  # settings:
  #   ## All possible featureFlags: _base.yaml => _base.featureFlags
  #   ## This should be defined at chezmoi.yaml by user input (prompt)
  #   featureFlags: []
  settings: {}

  definitions:
    # featureFlags:
    #   <flag-name>:
    #     type: file          ## at .chezmoitemplates/featureFlags/contents/<flag-name>/<file-name>.{age,tmpl,txt}
    #     [name: <file-name>] ## Use when need to define different file name, no need to provide extension (default to index)
    #   <flag-name>:
    #     type: string
    #     value: <constant>
    #   <flag-name>:
    #     type: opRead
    #     value: <op://vault/item/field>
    #   <flag-name>:
    #     type: opDoc
    #     value: <uuid>
    #     [vault: <vault-uuid>]
    featureFlags:
      smartertravel:aws:
        type: file
