machine:
  darwin:
    settings:
      featureFlags:
        - ai::claude:enable
        - ai::codex:enable
        - ai::gemini:enable
        - ai::copilot:enable
        - aws::enable
        - aws::stm:config
        - aws-vpn::stm:config
        - wd::stm:path
        - wd::vscode-insider:path
        - git::stm:config
        - git::sign:config
        - git::onepassword:config
        - ssh::onepassword:config
        - ssh::github:config
        - ssh::gitlab:config
        - ssh::bitbucket:config
        - ssh::stm:config
        - ssh::homepi:config
        - kube::personal:config
        - kube::stm:config

    preferences:
      defaults:
        - domain: NSGlobalDomain
          settings:
            - key: com.apple.keyboard.fnState ## If true, enables F1, F2, etc. keys as standard function keys.
              value: false
            - key: com.apple.mouse.tapBehavior ## Trackpad tap behavior (null: click, 1: tap)
              value: 1
            - key: com.apple.sound.beep.feedback ## Make a feedback sound when system volume changes (0: no sound, 1: play sound)
              value: 1
            - key: com.apple.sound.beep.volume ## Sets beep volume from 0.000 (muted) to 1.000 (100% volume)
              value: 1.0
              type: float
            - key: com.apple.swipescrolldirection ## If true, enables natural scrolling direction on trackpad
              value: true
            - key: com.apple.springing.enabled ## If true, enables spring loading for directories (e.g. in Finder)
              value: true
            - key: com.apple.springing.delay ## Delay until spring loading in seconds (default 0.5)
              value: 0.3
            - key: _HIHideMenuBar ## If true, automatically hide and show the menu bar
              value: false
            - key: AppleActionOnDoubleClick ## Window title bar double-click action ("Fill", "Maximize", "Minimize", or "None")
              value: Maximize
            - key: NSQuitAlwaysKeepsWindow ## If true, documents and windows are restored when reopening an app
              value: false
            - key: AppleShowAllExtensions ## If true, shows all filename extensions in Finder
              value: true
            - key: AppleInterfaceStyleSwitchesAutomatically ## Auto-switch theme on schedule
              value: true
            - key: AppleKeyboardUIMode ## Keyboard navigation (0: disabled, 2: full navigation)
              value: 2
            - key: ApplePressAndHoldEnabled ## If true, press and hold keys to show accented characters
              value: false
            - key: AppleSpacesSwitchOnActivate ## If true, switch to a workspace that has a window of the app open
              value: true
            - key: AppleShowScrollBars ## Show scroll bars ("WhenScrolling", "Automatic", "Always")
              value: WhenScrolling
            - key: AppleShowAllFiles ## If true, shows hidden files in Finder
              value: false
            - key: AppleWindowTabbingMode ## Window tabbing mode for new documents ("manual", "always", "fullscreen")
              value: always
            - key: InitialKeyRepeat ## Delay until key repeat (input * 15ms)
              value: 25
            - key: KeyRepeat ## Key repeat rate (input * 15ms)
              value: 2
            - key: NSAutomaticCapitalizationEnabled ## If true, enables automatic capitalization
              value: true
            - key: NSAutomaticDashSubstitutionEnabled ## If true, enables smart dash substitution
              value: true
            - key: NSAutomaticInlinePredictionEnabled ## If true, enables inline predictive text
              value: true
            - key: NSAutomaticPeriodSubstitutionEnabled ## If true, enables automatic period substitution
              value: true
            - key: NSAutomaticQuoteSubstitutionEnabled ## If true, enables smart quote substitution
              value: true
            - key: NSAutomaticSpellingCorrectionEnabled ## If true, enables automatic spelling correction
              value: true
            - key: NSAutomaticWindowAnimationsEnabled ## If true, enables automatic window animations
              value: true
            - key: NSDocumentSaveNewDocumentsToCloud ## If true, new documents are saved to iCloud by default
              value: true
            - key: NSNavPanelExpandedStateForSaveMode ## If true, expands save panel by default
              value: true
            - key: NSNavPanelExpandedStateForSaveMode2 ## Same as NSNavPanelExpandedStateForSaveMode
              value: true
            - key: PMPrintingExpandedStateForPrint ## If true, expands print panel by default
              value: true
            - key: PMPrintingExpandedStateForPrint2 ## Same as PMPrintingExpandedStateForPrint
              value: true
            - key: NSScrollAnimationEnabled ## If true, enables smooth scrolling
              value: true
            - key: NSUseAnimatedFocusRing ## If true, enables animated focus ring
              value: false
            - key: NSTableViewDefaultSizeMode ## Finder sidebar icon size (1: small, 2: medium, 3: large)
              value: 2
            - key: NSWindowResizeTime ## Window resize speed (default 0.2)
              value: 0.01
            - key: NSWindowShouldDragOnGesture ## If true, enables moving window by holding anywhere on it
              value: true
            - key: NSTextShowsControlCharacters ## If true, shows control characters in ASCII code (TextEdit)
              value: true
            - key: AppleLanguages ## Ordered list of preferred UI languages
              value: [en-TH, th-TH]
            - key: AppleLocale ## Active locale
              value: en_TH@calendar=gregorian
            - key: AppleMetricUnits ## If true, uses metric units
              value: true
            - key: com.apple.mouse.tapBehavior ## Tap to click on trackpad
              host: current
              value: 1
            - key: com.apple.trackpad.forceClick ## If true, enables Force Click and haptic feedback on trackpad
              value: true
            - key: com.apple.trackpad.scaling ## Trackpad tracking speed (0: slow, 3: fast)
              value: 3
            - key: com.apple.trackpad.enableSecondaryClick ## If true, enables right-click on trackpad
              host: current
              value: true
            - key: com.apple.trackpad.threeFingerTapGesture ## Three-finger tap gesture (0: Force-Click-delegated, 2: tap with three fingers)
              host: current
              value: 0
            - key: com.apple.trackpad.threeFingerDragGesture ## If true, enables dragging items with three fingers
              host: current
              value: true
            - key: com.apple.trackpad.threeFingerHorizSwipeGesture ## Three-finger horizontal swipe gesture (0: disabled, 2: enabled)
              host: current
              value: 0
            - key: com.apple.trackpad.threeFingerVertSwipeGesture ## Three-finger vertical swipe gesture (0: disabled, 2: enabled)
              host: current
              value: 0

        - domain: com.apple.AppleMultitouchTrackpad
          settings:
            - key: FirstClickThreshold ## First click pressure sensitivity (0: light, 1: medium, 2: firm)
              value: 1
            - key: SecondClickThreshold ## Second click pressure sensitivity (0: light, 1: medium, 2: firm)
              value: 1
            - key: ForceSuppressed ## If true, disables Force Click and haptic feedback on built-in trackpad
              value: false
            - key: Clicking ## Same as NSGlobalDomain com.apple.mouse.tapBehavior
              value: true
            - key: TrackpadRightClick ## If true, enables right-click by clicking with two fingers
              value: true
            - key: TrackpadCornerSecondaryClick ## Right-click corner (0: disabled, 1: bottom-right corner)
              value: 0
            - key: TrackpadThreeFingerTapGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerTapGesture
              value: 0
            - key: TrackpadThreeFingerDrag ## Same as NSGlobalDomain com.apple.trackpad.threeFingerDragGesture
              value: true
            - key: TrackpadThreeFingerHorizSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerHorizSwipeGesture (conflicts with TrackpadThreeFingerDrag)
              value: 0
            - key: TrackpadThreeFingerVertSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerVertSwipeGesture (conflicts with TrackpadThreeFingerDrag)
              value: 0

        - domain: com.apple.driver.AppleBluetoothMultitouch.trackpad
          settings:
            - key: Clicking ## Same as NSGlobalDomain com.apple.mouse.tapBehavior
              value: true
            - key: TrackpadRightClick ## If true, enables right-click by clicking with two fingers
              value: true
            - key: TrackpadCornerSecondaryClick ## Right-click corner (0: disabled, 1: bottom-right corner)
              value: 0
            - key: TrackpadThreeFingerTapGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerTapGesture
              value: 0
            - key: TrackpadThreeFingerDrag ## Same as NSGlobalDomain com.apple.trackpad.threeFingerDragGesture
              value: true
            - key: TrackpadThreeFingerHorizSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerHorizSwipeGesture (conflicts with TrackpadThreeFingerDrag)
              value: 0
            - key: TrackpadThreeFingerVertSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerVertSwipeGesture (conflicts with TrackpadThreeFingerDrag)
              value: 0

        - domain: com.apple.AppleMultitouchMouse
          settings: []

        - domain: com.apple.driver.AppleBluetoothMultitouch.mouse
          settings: []

        - domain: com.apple.dock
          hooks:
            after: killall Dock
          settings:
            - key: autohide ## If true, enables "Automatically hide and show the Dock"
              value: true
            - key: autohide-time-modifier ## Dock open/close animation time (default 0.5)
              value: 0.3
            - key: autohide-delay ## Dock opening delay (default 0.2)
              value: 0.2
            - key: magnification ## If true, enables Dock magnification
              value: true
            - key: tilesize ## Dock tile size (16 - 128)
              value: 64
            - key: largesize ## Largest magnification size (16 - 128)
              value: 80
            - key: show-recents ## If true, enables "Show recent items"
              value: false
            - key: mineffect ## Window minimize effect
              value: genie
            - key: orientation ## Dock orientation
              value: bottom
            - key: static-only ## If true, only show opened apps in Dock
              value: false
            - key: scroll-to-open ## Scroll up on a Dock icon to show all opened windows
              value: true
            - key: expose-group-apps ## If true, groups windows by app in Mission Control
              value: true
            - key: mru-spaces ## If true, automatically rearranges Spaces based on most recent use
              value: false
              ## top-left hot corner
              ## corner value:
              ##   1: No Action
              ##   2: Mission Control
              ##   3: Application Windows
              ##   4: Desktop
              ##   5: Start Screen Saver
              ##   6: Disable Screen Saver
              ##   10: Put Display to Sleep
              ##   11: Apps
              ##   12: Notification Center
              ##   13: Lock Screen
              ##   14: Quick Note
            - key: wvous-tl-corner
              value: 1
            - key: wvous-tl-modifier
              value: 0
              ## top-right hot corner
            - key: wvous-tr-corner
              value: 1
            - key: wvous-tr-modifier
              value: 0
              ## bottom-left hot corner
            - key: wvous-bl-corner
              value: 5
            - key: wvous-bl-modifier
              value: 0
            - key: wvous-br-corner
              ## bottom-right hot corner
              value: 14
            - key: wvous-br-modifier
              value: 0

        ## `NSStatusItem VisibleCC *` is flag to show/hide Control Center items in menu bar.
        ## `NSStatusItem Preferred Position *` is the preferred position of the item in menu bar
        ##   - recommended to set the position manually and copy position value here
        ##   - use command: `defaults read com.apple.controlcenter | grep 'NSStatusItem Preferred Position'``
        - domain: com.apple.controlcenter
          hooks:
            after: killall ControlCenter
          settings:
            - key: AutoHideMenuBarOption ## Auto-hide menu bar (0: always, 1: desktop only, 2: full screen only, 3: never)
              value: 2
            - key: RemoteLiveActivitiesEnabled ## If true, enables Live Activities
              value: true
            - key: NumberOfRecents ## Number of recent items
              value: 0
            - key: "NSStatusItem VisibleCC WiFi" ## If true, shows WiFi in menubar (position increase by 34)
              value: false
            - key: "NSStatusItem VisibleCC Bluetooth" ## If true, shows Bluetooth in menubar
              value: false
            - key: "NSStatusItem VisibleCC AirDrop" ## If true, shows AirDrop in menubar
              value: false
            - key: "NSStatusItem VisibleCC Battery" ## If true, shows Battery in menubar
              value: false
            - key: "NSStatusItem VisibleCC UserSwitcher" ## If true, shows User Switcher in menubar
              value: false
            - key: "NSStatusItem VisibleCC FocusModes" ## If true, shows Focus Modes in menubar
              value: false
            - key: "NSStatusItem VisibleCC KeyboardBrightness" ## If true, shows Keyboard Brightness in menubar
              value: false
            - key: Siri ## Toggle Siri in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: Spotlight ## Toggle Spotlight in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: WiFi ## Toggle WiFi in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: Bluetooth ## Toggle Bluetooth in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: Battery ## Toggle Battery in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: AirDrop ## Toggle AirDrop in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: FocusModes ## Toggle Focus Modes in Control Center (8: off, 2: on, 18: always on)
              host: current
              value: 8
            - key: ScreenMirroring ## Toggle Screen Mirroring in Control Center (8: off, 2: on, 18: always on)
              host: current
              value: 8
            - key: Display ## Toggle Display in Control Center (8: off, 2: on, 18: always on)
              host: current
              value: 8
            - key: Sound ## Toggle Sound in Control Center (8: off, 2: on, 18: always on)
              host: current
              value: 8
            - key: NowPlaying ## Toggle Now Playing in Control Center (8: off, 2: on, 18: always on)
              host: current
              value: 8
            - key: UserSwitcher ## Toggle User Switcher in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: TimeMachine ## Toggle Time Machine in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: KeyboardBrightness ## Toggle Keyboard Brightness in Control Center (8: off, 2: on)
              host: current
              value: 8
            - key: Timer ## Toggle Timer in Control Center (8: off, 2: on, 18: always on)
              host: current
              value: 8
            - key: Weather ## Toggle Weather in Control Center (8: off, 2: on)
              host: current
              value: 8

        - domain: com.apple.Siri
          settings:
            - key: StatusMenuVisible ## If true, shows Siri in menu bar
              value: false

        - domain: com.apple.Spotlight
          settings:
            - key: "NSStatusItem VisibleCC Item-0" ## If true, shows Spotlight in menu bar
              value: false

        - domain: com.apple.menuextra.clock
          hooks:
            after: killall SystemUIServer
          settings:
            - key: IsAnalog ## If true, shows analog clock in menu bar
              value: true
            - key: Show24Hour ## If true, shows 24-hour time format
              value: true
            - key: ShowAMPM ## If true, shows AM/PM suffix
              value: false
            - key: ShowDate ## Date visibility in menu bar (0: off, 1: on, 2: when space allows)
              value: 1
            - key: ShowDayOfWeek ## If true, shows day of week in menu bar
              value: true
            - key: ShowSeconds ## If true, shows seconds in menu bar clock
              value: true
            - key: FlashDateSeparators ## If true, flashes time separators (for example, the colon)
              value: false
            - key: TimeAnnouncementsEnabled ## If true, enables time announcements
              value: false
            - key: TimeAnnouncementsIntervalIdentifier ## Time announcement interval identifier
              value: EveryHourInterval

        - domain: com.apple.WindowManager
          settings:
            - key: EnableTopTilingByEdgeDrag ## If true, drag windows to menu bar to fill screen
              value: true
            - key: EnableTilingByEdgeDrag ## If true, drag windows to screen edges to tile
              value: true
            - key: EnableTilingOptionAccelerator ## If true, Hold ⌥ while dragging to tile
              value: true
            - key: EnableTiledWindowMargins ## If true, adds margins to tiled windows
              value: false
            - key: EnableStandardClickToShowDesktop ## If true, click wallpaper to show desktop
              value: true
            - key: HideDesktop ## If true, hide items in Stage Manager
              value: false
            - key: StandardHideDesktopIcons ## If true, hide items on desktop
              value: false

        - domain: com.apple.spaces
          settings:
            - key: spans-displays ## If true, displays have separate Spaces
              value: true

        - domain: com.apple.finder
          hooks:
            after: killall Finder
          settings:
            - key: _FXSortFoldersFirst ## If true, keeps folders on top when sorting by name
              value: true
            - key: ShowPathbar ## If true, shows path bar in Finder
              value: true
            - key: ShowStatusBar ## If true, shows status bar (item count, disk space)
              value: true
            - key: ShowSidebar ## If true, shows sidebar in Finder
              value: true
            - key: CreateDesktop ## If true, shows icons on desktop
              value: true
            - key: ShowHardDrivesOnDesktop ## If true, shows hard drives on desktop
              value: false
            - key: ShowExternalHardDrivesOnDesktop ## If true, shows external hard drives on desktop
              value: true
            - key: ShowRemovableMediaOnDesktop ## If true, shows removable media on desktop
              value: true
            - key: QuitMenuItem ## If true, shows "Quit Finder" option in Finder menu
              value: true
            - key: WarnOnEmptyTrash ## If true, warns before emptying Trash
              value: true
            - key: FXPreferredViewStyle ## Default Finder view style ("nlsv", "icnv", "clmv", "glyv")
              value: nlsv
            - key: NewWindowTarget ## Default location for new Finder windows
              value: PfHm
            - key: NewWindowTargetPath ## Path for NewWindowTarget when set to custom (PfLo)
              value: null
            - key: FXDefaultSearchScope ## Default Finder search scope ("SCev", "SCcf", "SCsp")
              value: SCcf

      shortcututil:
        - name: Save screenshot of screen
          key: 28
          enabled: false
        - name: Copy screenshot of screen
          key: 29
          enabled: false
        - name: Save screenshot of selection
          key: 30
          enabled: false
        - name: Copy screenshot of selection
          key: 31
          enabled: false
        - name: Screenshot and recording options
          key: 184
          enabled: false
        - name: Toggle VoiceOver
          key: 59
          enabled: false
        - name: Previous input source
          key: 60
          enabled: false
        - name: Next input source
          key: 61
          enabled: false
        - name: Spotlight search field
          key: 64
          enabled: false
        - name: Spotlight/Finder search (variant)
          key: 65
          enabled: false

      dockutil:
        apps:
          - name: "/System/Applications/Apps.app"
          - name: "/Applications/1Password.app"
          - name: "/System/Applications/Messages.app"
          - name: "/Applications/Slack.app"
          - name: "/Applications/Setapp/Spark Mail.app" ## Requires installing from Setapp
          - name: "/Applications/Brave Origin Beta.app"
          - name: "/Applications/Visual Studio Code - Insiders.app"
          - name: "/Applications/Ghostty.app"
        others:
          - name: "$HOME/Downloads"
            settings:
              view: auto
              display: stack
              sort: dateadded
              allhomes: true
        settings:
          autoremove: true

    dependencies:
      brew:
        taps: []
        packages:
          - ca-certificates ## For SSL certificates
          - coreutils       ## For advance utilization tools
          - cosign          ## For verify downloaded cli via mise
          - curl            ## For install commands in general
          - git             ## For version control
          - graphviz        ## For visualizing graphs
          - nmap            ## For network exploration tools
          - openssh         ## For SSH tools (e.g. ssh, scp, etc.)
          - ykman           ## For Yubico Authenticator CLI
          - smartmontools   ## For monitoring storage devices (smartctl)
        casks:
          - 1password@beta                ## For password management
          - alfred                        ## For productivity booster
          - aws-vpn-client                ## For AWS VPN connection
          - brave-origin@beta             ## For web browsing
          - chatgpt                       ## For AI chat assistant
          - claude                        ## For AI chat assistant
          - codex-app                     ## For AI code assistant
          - docker-desktop                ## For container management
          - font-jetbrains-mono           ## For programming font in general
          - font-jetbrains-mono-nerd-font ## For Visual Studio Code
          - ghostty                       ## For terminal emulator
          - google-chrome                 ## For web browsing (alternative)
          - gpg-suite                     ## For GPG tools on macOS
          - keybase                       ## For secure file sharing and communication
          - logi-options+                 ## For Logitech device management
          - okta-verify                   ## For Okta authentication
          - setapp                        ## For installing multiple apps
          - slack                         ## For team communication
          - steam                         ## For gaming platform
          - visual-studio-code@insiders   ## For code editor
        settings:
          binpath: /opt/homebrew/bin

      mas:
        packages:
          - name: 1Password for Safari
            id: 1569813296
          - name: Keynote
            id: 361285480
          - name: Magnet
            id: 441258766
          - name: Numbers
            id: 361304891
          - name: Pages
            id: 361309726
          - name: Yubico Authenticator
            id: 1497506650
          # - name: Final Cut Pro
          #   id: 424389933
          # - name: Xcode
          #   id: 497799835
          # - name: Compressor
          #   id: 424390742
          # - name: MainStage
          #   id: 634159523
          # - name: Logic Pro
          #   id: 634148309
        settings: {}

      mise:
        packages: <ALL>
        settings: {}
