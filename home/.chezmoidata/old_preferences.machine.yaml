## ref: ../../CONTRIBUTING.md#chezmoi-data

preferences:
  machine:
    darwin:
      - command: defaults
        namespace: NSGlobalDomain
        settings:
          - key: com.apple.keyboard.fnState ## If true, enables F1, F2, etc. keys as standard function keys.
            value: false
          - key: com.apple.mouse.tapBehavior ## trackpad tap behavior (null: click, 1: tap)
            value: 1
          - key: com.apple.sound.beep.feedback ## Make a feedback sound when the system volume changed (0: no sound, 1: play sound)
            value: 1
          - key: com.apple.sound.beep.volume ## Sets the beep volume level from 0.000 (muted) to 1.000 (100% volume)
            value: 1.0
          - key: com.apple.swipescrolldirection ## If true, enables "Natural" scrolling direction on trackpad
            value: true
          - key: com.apple.springing.enabled ## If true, enables spring loading for directories (e.g. in Finder)
            value: true
          - key: com.apple.springing.delay ## The delay until spring loading in seconds (default 0.5)
            value: 0.3
          - key: _HIHideMenuBar ## If true, automatically hide and show the menu bar
            value: false
          - key: AppleActionOnDoubleClick ## Window title bar double-click action ("Fill", "Maximize", "Minimize" or "None")
            value: Maximize
          - key: NSQuitAlwaysKeepsWindow ## If true, documents and windows will be restored when re-open an application
            value: false
          - key: AppleShowAllExtensions ## If true, shows all filename extensions in Finder
            value: true
          - key: AppleInterfaceStyleSwitchesAutomatically ## Auto-switch Theme on schedule
            value: true
          - key: AppleKeyboardUIMode ## Keyboard navigation (0: disabled, 2: full navigation)
            value: 2
          - key: ApplePressAndHoldEnabled ## If true, press and hold keys to show accented characters
            value: false
          - key: AppleSpacesSwitchOnActivate ## Auto-switch to the Space containing an app's window
            value: true
          - key: AppleShowScrollBars ## Show scroll bars ("WhenScrolling", "Automatic", "Always")
            value: WhenScrolling
          - key: AppleShowAllFiles ## If true, shows hidden files in Finder
            value: false
          - key: AppleSpacesSwitchOnActivate ## If true, switch to a workspace that has a window of the application open
            value: true
          - key: AppleWindowTabbingMode ## Sets the window tabbing when opening a new document ("manual", "always", "fullscreen")
            value: always
          - key: InitialKeyRepeat ## The delay until key repeat (input * 15ms)
            value: 25
          - key: KeyRepeat ## The key repeat rate (input * 15ms)
            value: 2
          - key: NSAutomaticCapitalizationEnabled ## If true, enables automatic capitalization
            value: true
          - key: NSAutomaticDashSubstitutionEnabled ## If true, enables smart dash substitution
            value: true
          - key: NSAutomaticInlinePredictionEnabled ## If true, enables inline predictive text
            value: true
          - key: NSAutomaticPeriodSubstitutionEnabled ## If true, enables automatic period substitution
            value: true
          - key: NSAutomaticQuoteSubstitutionEnabled ## If true, enables smart quote substitution
            value: true
          - key: NSAutomaticSpellingCorrectionEnabled ## If true, enables automatic spelling correction
            value: true
          - key: NSAutomaticWindowAnimationsEnabled ## If true, enables automatic window animations
            value: true
          - key: NSDocumentSaveNewDocumentsToCloud ## If true, new documents will be saved to iCloud by default
            value: true
          - key: NSNavPanelExpandedStateForSaveMode ## If true, expands the save panel by default when saving a document
            value: true
          - key: NSNavPanelExpandedStateForSaveMode2 ## Same as NSNavPanelExpandedStateForSaveMode
            value: true
          - key: PMPrintingExpandedStateForPrint ## If true, expands the print panel by default when printing a document
            value: true
          - key: PMPrintingExpandedStateForPrint2 ## Same as PMPrintingExpandedStateForPrint
            value: true
          - key: NSScrollAnimationEnabled ## If true, enables smooth scrolling
            value: true
          - key: NSUseAnimatedFocusRing ## If true, enables animated focus ring
            value: false
          - key: NSTableViewDefaultSizeMode ## Sets the size of the finder sidebar icons (1: small, 2: medium, 3: large)
            value: 2
          - key: NSWindowResizeTime ## Sets the speed speed of window resizing (default 0.2)
            value: 0.01
          - key: NSWindowShouldDragOnGesture ## If true, enables moving window by holding anywhere on it
            value: true
          - key: NSTextShowsControlCharacters ## If true, shows control characters in ASCII code (TextEdit)
            value: true
          - key: AppleLanguages ## Ordered list of preferred UI languages.
            value: [en-TH, th-TH]
          - key: AppleLocale ## Active locale
            value: en_TH@calendar=gregorian
          - key: AppleMetricUnits ## If true, uses metric units
            value: true
          - key: com.apple.mouse.tapBehavior ## Tap to click on trackpad
            host: current
            value: 1
          - key: com.apple.trackpad.forceClick ## If true, enables Force Click and haptic feedback on trackpad
            value: true
          - key: com.apple.trackpad.scaling ## Trackpad tracking speed (0: slow, 3: fast)
            value: 3
          - key: com.apple.trackpad.enableSecondaryClick ## If true, enables right-click on trackpad
            host: current
            value: true
          - key: com.apple.trackpad.threeFingerTapGesture ## Three finger tap gesture (0: Force-Click-delegated, 2 = Tap with Three Fingers)
            host: current
            value: 0
          - key: com.apple.trackpad.threeFingerDragGesture ## If true, enables dragging items with three fingers on trackpad
            host: current
            value: true
          - key: com.apple.trackpad.threeFingerHorizSwipeGesture ## Three finger horizontal swipe gesture (0: disabled, 2: enables)
            host: current
            value: 0
          - key: com.apple.trackpad.threeFingerVertSwipeGesture ## Three finger vertical swipe gesture (0: disabled, 2: enables)
            host: current
            value: 0

      - command: defaults
        namespace: com.apple.AppleMultitouchTrackpad ## Only applies to built-in trackpad on MacBooks
        settings:
          - key: FirstClickThreshold ## The pressure sensitivity for the first click (0: light, 1: medium, 2: firm)
            value: 1
          - key: SecondClickThreshold ## The pressure sensitivity for the second click (0: light, 1: medium, 2: firm)
            value: 1
          - key: ForceSuppressed ## If true, disables Force Click and haptic feedback on built-in trackpad
            value: false
          - key: Clicking ## Same as NSGlobalDomain com.apple.mouse.tapBehavior
            value: true
          - key: TrackpadRightClick ## When com.apple.trackpad.enableSecondaryClick, if true, enables right-click by clicking with two fingers on trackpad
            value: true
          - key: TrackpadCornerSecondaryClick ## When com.apple.trackpad.enableSecondaryClick, the corner of the trackpad for right-click (0: disabled, 1: bottom right corner)
            value: 0
          - key: TrackpadThreeFingerTapGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerTapGesture
            value: 0
          - key: TrackpadThreeFingerDrag ## Same as NSGlobalDomain com.apple.trackpad.threeFingerDragGesture
            value: true
          - key: TrackpadThreeFingerHorizSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerHorizSwipeGesture (conflicts with TrackpadThreeFingerDrag)
            value: 0
          - key: TrackpadThreeFingerVertSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerVertSwipeGesture (conflicts with TrackpadThreeFingerDrag)
            value: 0

      - command: defaults
        namespace: com.apple.driver.AppleBluetoothMultitouch.trackpad ## Only applies to external trackpad like Magic Trackpad
        settings:
          - key: Clicking ## Same as NSGlobalDomain com.apple.mouse.tapBehavior
            value: true
          - key: TrackpadRightClick ## When com.apple.trackpad.enableSecondaryClick, if true, enables right-click by clicking with two fingers on trackpad
            value: true
          - key: TrackpadCornerSecondaryClick ## When com.apple.trackpad.enableSecondaryClick, the corner of the trackpad for right-click (0: disabled, 1: bottom right corner)
            value: 0
          - key: TrackpadThreeFingerTapGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerTapGesture
            value: 0
          - key: TrackpadThreeFingerDrag ## Same as NSGlobalDomain com.apple.trackpad.threeFingerDragGesture
            value: true
          - key: TrackpadThreeFingerHorizSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerHorizSwipeGesture (conflicts with TrackpadThreeFingerDrag)
            value: 0
          - key: TrackpadThreeFingerVertSwipeGesture ## Same as NSGlobalDomain com.apple.trackpad.threeFingerVertSwipeGesture (conflicts with TrackpadThreeFingerDrag)
            value: 0

      - command: defaults
        namespace: com.apple.AppleMultitouchMouse ## Only applies to wired/USB Magic Mouse
        settings: []

      - command: defaults
        namespace: com.apple.driver.AppleBluetoothMultitouch.mouse ## Only applies to external mouse like Bluetooth Magic Mouse
        settings: []

      - command: defaults
        namespace: com.apple.dock
        hooks:
          after: killall Dock
        settings:
          - key: autohide ## If true, enables “Automatically hide and show the Dock”
            value: true
          - key: autohide-time-modifier ## Change the Dock opening and closing animation times (default 0.5)
            value: 0.3
          - key: autohide-delay ## Change the Dock opening delay (default 0.2)
            value: 0.2
          - key: magnification ## If true, enables magnification
            value: true
          - key: tilesize ## The tile size (16 - 128)
            value: 64
          - key: largesize ## The size of the largest magnification (16 - 128)
            value: 80
          - key: show-recents ## If true, enables “Show recent items.”
            value: false
          - key: mineffect ## The minimize effect
            value: genie
          - key: orientation ## The orientation of the Dock.
            value: bottom
          - key: static-only ## If true, only show opened apps in Dock
            value: false
          - key: scroll-to-open ## Scroll up on a Dock icon to show all opened windows
            value: true

      - command: defaults
        namespace: com.apple.controlcenter
        hooks:
          after: killall ControlCenter
        settings:
          - key: AutoHideMenuBarOption ## Automatically hide and show the menu bar (0: Always, 1: Desktop only, 2: Full screen only, 3: Never)
            value: 2
          - key: RemoteLiveActivitiesEnabled ## If true, enables showing Live Activities in Control Center on Mac
            value: true

      - command: defaults
        namespace: com.apple.finder
        hooks:
          after: killall Finder
        settings:
          - key: _FXSortFoldersFirst ## If true, keeps folders on top when sorting by name in Finder
            value: true
          - key: ShowPathbar ## If true, shows the path bar in Finder
            value: true
          - key: ShowStatusBar ## If true, shows the status bar (item-count, available disk space) in Finder
            value: true
          - key: ShowSidebar ## If true, shows the sidebar in Finder
            value: true
          - key: CreateDesktop ## If true, shows icons on the desktop
            value: true
          - key: ShowHardDrivesOnDesktop ## If true, shows hard drives on the desktop
            value: false
          - key: ShowExternalHardDrivesOnDesktop ## If true, shows external hard drives on the desktop
            value: true
          - key: ShowRemovableMediaOnDesktop ## If true, shows removable media on the desktop
            value: true
          - key: QuitMenuItem ## If true, shows the "Quit Finder" option in the Finder menu
            value: true
          - key: WarnOnEmptyTrash ## If true, shows a warning before emptying the Trash
            value: true
          - key: FXPreferredViewStyle ## The default view style in Finder windows ("nlsv": list view, "icnv": icon view, "clmv": column view, "glyv": gallery view)
            value: nlsv
          - key: NewWindowTarget ## The default location for new Finder windows ("PfHm": Home, "PfDe": Desktop, "PfDo": Documents, "PfLi": iCloud Drive, "PfAF": Recents, "PfCm": Computer, "PfLo": Custom Location)
            value: PfHm
          - key: NewWindowTargetPath ## The path for new Finder windows when NewWindowTarget is set to "PfLo" (e.g. file:///Users/<username>/Downloads/)
            value: null
          - key: FXDefaultSearchScope ## The default search scope when performing a search in Finder ("SCev": This Mac, "SCcf": Current Folder, "SCsp": Use the Previous Search Scope)
            value: SCcf

      - command: defaults
        namespace: com.apple.menuextra.clock
        hooks:
          after: killall SystemUIServer
        settings:
          - key: IsAnalog ## If true, shows analog clock in menu bar
            value: true
          - key: Show24Hour ## If true, shows time in 24-hour format
            value: true
          - key: ShowAMPM ## If true, shows AM/PM suffix
            value: false
          - key: ShowDate ## Show the date in the menu bar (0: off, 1: on, 2: when space allows)
            value: 1
          - key: ShowDayOfWeek ## If true, shows the day of the week in the menu bar
            value: true
          - key: ShowSeconds ## If true, shows seconds in the menu bar clock
            value: true
          - key: FlashDateSeparators ## If true, flashes the time separators (e.g. the colon in 12:34) on and off
            value: false
          - key: TimeAnnouncementsEnabled ## If true, enables time announcements
            value: false
          - key: TimeAnnouncementsIntervalIdentifier ## The interval for time announcements (EveryHourInterval, EveryHalfHourInterval, EveryQuarterHourInterval)
            value: EveryHourInterval

      - command: dockutil
        hooks:
          ## Reset the Dock to empty list before applying changes
          before: defaults write com.apple.dock persistent-apps -array
          after: |
            killall Dock
        apps:
          - name: /System/Applications/Apps.app
            action: add ## Support values: add (default), move, or remove
          - name: /Applications/1Password.app
          - name: /System/Applications/Messages.app
          - name: /Applications/Slack.app
          - name: "/Applications/Setapp/Spark Mail.app" ## NOTE: This requires installing from Setapp
          - name: "/Applications/Brave Browser.app"
          - name: "/Applications/Visual Studio Code - Insiders.app"
          - name: /Applications/Ghostty.app
        others:
          - name: ~/Downloads
            args: [--view auto, --display stack, --sort dateadded, --allhomes]

      ## Check docs/shortkeyutil.md
      - command: shortkeyutil
        settings:
          - key: 28 # Save screenshot of screen
            enabled: false
          - key: 29 # Copy screenshot of screen
            enabled: false
          - key: 30 # Save screenshot of selection
            enabled: false
          - key: 31 # Copy screenshot of selection
            enabled: false
          - key: 184 # Screenshot and recording options
            enabled: false

          - key: 59 # Toggle VoiceOver
            enabled: false

          - key: 60 # Previous input source
            enabled: false
          - key: 61 # Next input source
            enabled: false

          - key: 64 # Spotlight search field
            enabled: false
          - key: 65 # Spotlight/Finder search (variant)
            enabled: false
