docker:
  linux/debian:
    settings: {}
    preferences: {}
    dependencies:
      apt:
        packages: []
        settings:
          autoupdate: true
          autoupgrade: true
          autoclean: true
      brew:
        taps: []
        packages:
          - git
          - graphviz
          - nmap
        casks: []
        settings:
          binpath: /home/linuxbrew/.linuxbrew/bin
          env:
            HOMEBREW_MAKE_JOBS: "1"
            HOMEBREW_DOWNLOAD_CONCURRENCY: "1"
      mise:
        packages:
          - node
          - bun
          - go
          - python
          - uv
          - chezmoi
          - neovim
        settings:
          autoinstall: true
          autoupdate: false
