docker:
  linux/debian:
    settings:
      featureFlags:
        - nvim::plugins:install
        - zinit::plugins:install
    preferences: {}
    dependencies:
      apt:
        packages: []
        settings:
          autoupdate: true
          autoupgrade: true
          autoclean: true
      brew:
        taps: []
        packages:
          - git
          - graphviz
          - nmap
        casks: []
        settings:
          binpath: /home/linuxbrew/.linuxbrew/bin
      mise:
        packages:
          - node
          - bun
          - go
          - python
          - uv
          - chezmoi
          - neovim
        settings:
          autoinstall: true
          autoupdate: false
